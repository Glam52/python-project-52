<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Список задач</h1>
<a href="{% url 'task_create' %}">Создать задачу</a>
<table>
    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Автор</th>
        <th>Исполнитель</th>
        <th>Действия</th>
    </tr>
    {% for task in tasks %}
    <tr>
        <td>{{ task.id }}</td>
        <td><a href="{% url 'task_detail' task.pk %}">{{ task.name }}</a></td>
        <td>{{ task.author }}</td>
        <td>{{ task.executor }}</td>
        <td>
            <a href="{% url 'task_update' task.pk %}">Изменить</a>
            <a href="{% url 'task_delete' task.pk %}">Удалить</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
